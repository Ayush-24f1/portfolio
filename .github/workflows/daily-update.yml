name: Daily Repository Update

on:
  schedule:
    - cron: '0 9 * * *'   # Runs every day at 9:00 AM UTC
  workflow_dispatch:      # Allows manual trigger for testing

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository by 24f1001896@ds.study.iitm.ac.in
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Daily commit by 24f1001896@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          
          git config user.name "DevSync Bot"
          git config user.email "24f1001896@ds.study.iitm.ac.in"
          
          git add daily-log.txt
          git commit -m "Automated daily update: $(date)"
          git push
